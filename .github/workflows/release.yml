name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Bump Version
      id: bump
      run: |
        VERSION_FILE="src/QuantumMC/Utils/Version.cs"
        CSPROJ_FILE="src/QuantumMC/QuantumMC.csproj"
        
        CURRENT_VERSION=$(grep -oP 'Current = "\K[^"]+' $VERSION_FILE)
        
        BASE_VERSION=$(echo $CURRENT_VERSION | cut -d'-' -f1)
        
        IFS='.' read -ra ADDR <<< "$BASE_VERSION"
        MAJOR=${ADDR[0]}
        MINOR=${ADDR[1]}
        PATCH=${ADDR[2]}
        
        case ${{ github.event.inputs.bump_type }} in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
        
        sed -i "s/Current = \"$CURRENT_VERSION\"/Current = \"$NEW_VERSION\"/" $VERSION_FILE
        
        # Update csproj
        sed -i "s/<Version>$CURRENT_VERSION<\/Version>/<Version>$NEW_VERSION<\/Version>/" $CSPROJ_FILE
        
        git add $VERSION_FILE $CSPROJ_FILE
        git commit -m "chore: bump version to v$NEW_VERSION"
        git tag "v$NEW_VERSION"
        git push origin master --tags
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build
      run: dotnet build src/QuantumMC/QuantumMC.csproj --configuration Release
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.NEW_VERSION }}
        name:  QuantumMC v${{ env.NEW_VERSION }}
        draft: false
        prerelease: false
        body: |
          ## 🚀 What's New in v${{ env.NEW_VERSION }}
          
          This release brings new features and improvements to **QuantumMC**.
          
          ### 🛠️ Installation
          1. Download the `QuantumMC.dll` or executable from the assets below.
          2. Ensure you have the [.NET 10 Runtime](https://dotnet.microsoft.com/download/dotnet/10.0) installed.
          3. Run using `dotnet QuantumMC.dll` or the provided binary.
          
        files: src/QuantumMC/bin/Release/net10.0/QuantumMC.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
